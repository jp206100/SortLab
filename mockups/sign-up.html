<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SortLab — Sign Up (Mockup)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#e0eaff',
              500: '#4f6ef7',
              600: '#3b55e6',
              700: '#2d42c4',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="font-sans text-gray-900 antialiased bg-gray-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <header class="bg-white border-b border-gray-100">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center">
      <a href="landing.html" class="font-semibold tracking-tight text-gray-900">SortLab</a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-sm">

      <!-- Card -->
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">

        <div class="mb-6 text-center">
          <h1 class="text-xl font-semibold text-gray-900 mb-1">Create an account</h1>
          <p class="text-sm text-gray-500">Admin access to SortLab</p>
        </div>

        <form class="space-y-4" onsubmit="return false">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Name</label>
            <input
              type="text"
              placeholder="Jane Smith"
              class="w-full px-3.5 py-2.5 rounded-lg border border-gray-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent placeholder-gray-400 shadow-sm"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
            <input
              type="email"
              placeholder="you@example.com"
              class="w-full px-3.5 py-2.5 rounded-lg border border-gray-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent placeholder-gray-400 shadow-sm"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
            <input
              type="password"
              placeholder="••••••••"
              class="w-full px-3.5 py-2.5 rounded-lg border border-gray-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent placeholder-gray-400 shadow-sm"
            />
            <p class="text-xs text-gray-400 mt-1.5">Minimum 8 characters</p>
          </div>

          <button
            type="submit"
            class="w-full py-2.5 rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium shadow-sm transition-colors mt-2"
          >
            Create account
          </button>

        </form>

        <div class="mt-5 text-center text-sm text-gray-500">
          Already have an account?
          <a href="sign-in.html" class="text-brand-600 hover:text-brand-700 font-medium">Sign in</a>
        </div>

      </div>

    </div>
  </main>

  <!-- Mockup label -->
  <div class="fixed bottom-4 right-4 bg-yellow-100 border border-yellow-300 text-yellow-800 text-xs px-3 py-1.5 rounded-full font-medium shadow">
    Mockup · Sign up page
  </div>

</body>
</html>
