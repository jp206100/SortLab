<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SortLab — Dashboard (Mockup)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#e0eaff',
              500: '#4f6ef7',
              600: '#3b55e6',
              700: '#2d42c4',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="font-sans text-gray-900 antialiased bg-gray-50 min-h-screen flex flex-col">

  <!-- Top nav -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <span class="font-semibold tracking-tight text-gray-900">SortLab</span>

      <!-- User menu -->
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500">jane@example.com</span>
        <button class="text-sm text-gray-500 hover:text-gray-700 transition-colors px-3 py-1.5 rounded-lg hover:bg-gray-100">
          Sign out
        </button>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-6 py-10">

    <!-- Page header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-semibold text-gray-900">Workshops</h1>
        <p class="text-sm text-gray-500 mt-0.5">Manage your card sorting sessions</p>
      </div>
      <!-- Disabled in M1; shown for layout context -->
      <button
        disabled
        title="Coming in M2"
        class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-brand-600 text-white text-sm font-medium shadow-sm opacity-50 cursor-not-allowed"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
        </svg>
        New workshop
      </button>
    </div>

    <!-- Empty state -->
    <div class="flex flex-col items-center justify-center bg-white border border-dashed border-gray-200 rounded-2xl py-20 px-8 text-center">

      <!-- Illustration placeholder -->
      <div class="w-16 h-16 rounded-2xl bg-brand-50 flex items-center justify-center mb-5 text-3xl">
        🃏
      </div>

      <h2 class="text-base font-semibold text-gray-900 mb-1">No workshops yet</h2>
      <p class="text-sm text-gray-500 max-w-xs leading-relaxed mb-6">
        When you create a workshop, it'll appear here. You'll invite participants, run them through four phases, and export a content map.
      </p>

      <!-- Disabled CTA -->
      <button
        disabled
        title="Coming in M2"
        class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-brand-600 text-white text-sm font-medium shadow-sm opacity-50 cursor-not-allowed"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
        </svg>
        Create your first workshop
      </button>
      <p class="text-xs text-gray-400 mt-3">Workshop creation coming in M2</p>

    </div>

  </main>

  <!-- Mockup label -->
  <div class="fixed bottom-4 right-4 bg-yellow-100 border border-yellow-300 text-yellow-800 text-xs px-3 py-1.5 rounded-full font-medium shadow">
    Mockup · Dashboard (empty state)
  </div>

</body>
</html>
